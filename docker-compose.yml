version: '3.8'

services:
  bazarx-db:
    image: postgres:15-alpine
    container_name: bazarx-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - bazarx-db-data:/var/lib/postgresql/data
    networks:
      - bazarx-network

  bazarx-redis:
    image: redis:7-alpine
    container_name: bazarx-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - bazarx-network

  bazarx-minio:
    image: minio/minio
    container_name: bazarx-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - bazarx-minio-data:/data
    networks:
      - bazarx-network

networks:
  bazarx-network:
    driver: bridge

volumes:
  bazarx-db-data:
  bazarx-minio-data:
