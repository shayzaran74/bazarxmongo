# nginx/conf.d/bazarx.conf
# DOMAIN env değişkeni nginx'e geçirilmeli
# Örnek: bazarx.com.tr

# ─── HTTP → HTTPS redirect ─────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name bazarx.com.tr www.bazarx.com.tr;

    # Certbot challenge (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS Ana Site ────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bazarx.com.tr www.bazarx.com.tr;

    # SSL sertifikaları (Let's Encrypt)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # SSL güvenlik ayarları
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Güvenlik header'ları
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Max body size (dosya yükleme için)
    client_max_body_size 50M;

    # ─── Socket.io — KRİTİK BLOK ─────────────────────────────────
    # /socket.io/ path'i özel WebSocket upgrade gerektirir
    location /socket.io/ {
        proxy_pass http://backend_api;

        # WebSocket upgrade — ZORUNLU
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Header'lar
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout'lar — WebSocket bağlantısı uzun sürer
        proxy_read_timeout  86400s;  # 24 saat
        proxy_send_timeout  86400s;
        proxy_connect_timeout 10s;

        # Buffering — WebSocket'te kapatılmalı
        proxy_buffering off;
        proxy_cache off;

        # Socket.io polling fallback için CORS
        add_header Access-Control-Allow-Origin "https://bazarx.com.tr" always;
        add_header Access-Control-Allow-Credentials "true" always;
    }

    # ─── API (Backend REST) ───────────────────────────────────────
    location /api/ {
        proxy_pass http://backend_api;

        proxy_http_version 1.1;
        proxy_set_header Connection "";  # keepalive için boş bırak
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # Rate limiting (isteğe bağlı — aşağıda tanımlandı)
        # limit_req zone=api burst=20 nodelay;
    }

    # ─── Frontend (Nuxt SPA) ──────────────────────────────────────
    location / {
        proxy_pass http://frontend_app;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 30s;

        # Static asset caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend_app;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}

# ─── MinIO Media CDN ───────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name storage.bazarx.com.tr;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;

    # WebP için doğru MIME type
    types {
        image/webp  webp;
    }

    # Yükleme endpoint'i yok — sadece okuma
    client_max_body_size 1k;

    location ~ ^/bazarx-media/(.+)$ {
        proxy_pass http://minio_storage/bazarx-media/$1;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host minio:9000;

        # Uzun süreli cache — object key UUID içerdiği için güvenli
        proxy_cache media_cache;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header Vary Accept-Encoding;

        # Güvenlik: sadece GET/HEAD
        limit_except GET HEAD { deny all; }

        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        proxy_request_buffering off;
        access_log off;
    }

    # Diğer path'lere erişim yok
    location / {
        return 404;
    }
}
