# nginx/nginx.conf
# Socket.io prod için kritik: worker_processes, keepalive, upstream hash

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Log format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time"';

    access_log /var/log/nginx/access.log main;

    # Performans
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # Buffer ayarları — WebSocket için önemli
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;
    
    # ─── CACHE TANIMLAMLARI ──────────────────────────────────────────
    proxy_cache_path /var/cache/nginx/media levels=1:2 keys_zone=media_cache:10m max_size=10g inactive=30d use_temp_path=off;

    # ─── UPSTREAM TANIMLAMLARI ─────────────────────────────────────

    # Backend API — Socket.io sticky session için ip_hash
    upstream backend_api {
        ip_hash;  # ← Socket.io için KRİTİK: aynı client hep aynı worker'a
        server backend:3001;
        keepalive 32;
    }

    # Frontend (Nuxt SPA)
    upstream frontend_app {
        server frontend:3000;
        keepalive 16;
    }

    # MinIO
    upstream minio_storage {
        server minio:9000;
        keepalive 8;
    }

    # Virtual host config'leri
    include /etc/nginx/conf.d/*.conf;
}
