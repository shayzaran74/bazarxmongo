# infra/docker-compose.yml

version: '3.8'

services:
  # PostgreSQL 16 - Core ve Financial veritabanları için
  postgresql:
    image: postgres:16-alpine
    container_name: bazarx-postgresql
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-barterborsa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-barterborsa123}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    networks:
      - bazarx-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB 7 - Delivery servisi için
  mongodb:
    image: mongo:7
    container_name: bazarx-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-barterborsa}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-barterborsa123}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - bazarx-network

  # Mongo Express - MongoDB GUI (Prisma Studio benzeri)
  mongo-express:
    image: mongo-express
    container_name: bazarx-mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER:-barterborsa}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-barterborsa123}
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: pass
    depends_on:
      - mongodb
    networks:
      - bazarx-network

  # Redis 7 - Cache, Session ve Rate Limiting için
  redis:
    image: redis:7-alpine
    container_name: bazarx-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-barterborsa123}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - bazarx-network

  # RabbitMQ 3.13 - Event Bus için
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: bazarx-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RMQ_USER:-barterborsa}
      RABBITMQ_DEFAULT_PASS: ${RMQ_PASSWORD:-barterborsa123}
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    volumes:
      - rmq_data:/var/lib/rabbitmq
    networks:
      - bazarx-network

  # Minio - Asset yönetimi için (mevcut yapıdan korundu)
  minio:
    image: minio/minio
    container_name: bazarx-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-barterborsa}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-barterborsa123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - bazarx-network

networks:
  bazarx-network:
    driver: bridge

volumes:
  pg_data:
  mongo_data:
  redis_data:
  rmq_data:
  minio_data:
