# docker-compose.prod.yml
# Kök dizine koy: /bazarx/docker-compose.prod.yml

version: '3.9'

services:

  # ─── Reverse Proxy ───────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: bazarx_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - bazarx_net

  # ─── Frontend (Nuxt 3 SPA) ───────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile.prod
    container_name: bazarx_frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NUXT_PUBLIC_API_BASE=https://${DOMAIN}/api
      - NUXT_PUBLIC_MINIO_BASE=https://${MINIO_DOMAIN}/bazarx-public
    expose:
      - "3000"
    networks:
      - bazarx_net

  # ─── Backend (NestJS) ────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile.prod
    container_name: bazarx_backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://barterborsa:barterborsa123@postgres:5432/barterborsa_core?schema=public
      - REDIS_URL=redis://:barterborsa123@redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=barterborsa123
      - RABBITMQ_URL=amqp://barterborsa:barterborsa123@rabbitmq:5672
      - JWT_ACCESS_SECRET=bazarx_access_secret_2026_safe_key
      - JWT_REFRESH_SECRET=bazarx_refresh_secret_2026_safe_key
      - FRONTEND_URL=https://balmy-game-recount.ngrok-free.dev
      - IYZICO_API_KEY=${IYZICO_API_KEY}
      - IYZICO_SECRET_KEY=${IYZICO_SECRET_KEY}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - APP_BASE_URL=https://balmy-game-recount.ngrok-free.dev
      - FINANCIAL_GRPC_URL=financial-service:50051
    volumes:
      - bazarx_uploads:/app/public/uploads
    expose:
      - "3001"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 3001 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - bazarx_net

  # ─── Financial Service (gRPC) ────────────────────────────────────
  financial-service:
    build:
      context: .
      dockerfile: apps/financial-service/Dockerfile.prod
    container_name: bazarx_financial
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - FINANCIAL_DATABASE_URL=${FINANCIAL_DATABASE_URL}
      - GRPC_PORT=50051
    expose:
      - "50051"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bazarx_net

  # ─── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bazarx_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bazarx_net

  # ─── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bazarx_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bazarx_net

  # ─── RabbitMQ ────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: bazarx_rabbitmq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    expose:
      - "5672"
    # Management UI sadece internal — dışarıya açma
    # ports: - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - bazarx_net

  # ─── MinIO (Object Storage) ──────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: bazarx_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - bazarx_net

  # ─── Ngrok (Remote Access) ───────────────────────────────────────
  ngrok:
    image: ngrok/ngrok:latest
    container_name: bazarx_ngrok
    restart: unless-stopped
    command:
      - "http"
      - "--log=stdout"
      - "nginx:80"
    env_file: .env
    environment:
      - NGROK_AUTHTOKEN=3CWM9F43krNGnAqhb7Wj8j9jtxT_6ePigcgosvaTQXk957jdT
    depends_on:
      - nginx
    networks:
      - bazarx_net

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  nginx_logs:
  bazarx_uploads:

networks:
  bazarx_net:
    driver: bridge
