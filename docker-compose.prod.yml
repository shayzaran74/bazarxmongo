# docker-compose.prod.yml
version: '3.9'

services:

  # ─── Reverse Proxy ───────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: bazarx_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - bazarx_net

  # ─── Frontend (Nuxt 3 SPA) ───────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile.prod
    container_name: bazarx_frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NUXT_PUBLIC_API_BASE=https://bazarx.info/api
      - NUXT_PUBLIC_MINIO_BASE=https://bazarx.info/bazarx-media
    expose:
      - "3000"
    networks:
      - bazarx_net

  # ─── Backend (NestJS) ────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile.prod
    container_name: bazarx_backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      - JWT_ACCESS_SECRET=bazarx_access_secret_2026_safe_key
      - JWT_REFRESH_SECRET=bazarx_refresh_secret_2026_safe_key
      - FRONTEND_URL=https://bazarx.info
      - IYZICO_API_KEY=${IYZICO_API_KEY}
      - IYZICO_SECRET_KEY=${IYZICO_SECRET_KEY}
      - MINIO_ENDPOINT=minio
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - APP_BASE_URL=https://bazarx.info
      - FINANCIAL_GRPC_URL=financial-service:50051
    command: >
      sh -c "npx prisma db push --schema=apps/backend/prisma/schema.prisma --accept-data-loss && 
             node dist/apps/backend/src/main.js"
    volumes:
      - bazarx_uploads:/app/apps/backend/public/uploads
      - ./belge:/app/belge
    expose:
      - "3001"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 3001 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      financial-service:
        condition: service_healthy
    networks:
      - bazarx_net

  # ─── Financial Service (gRPC) ────────────────────────────────────
  financial-service:
    build:
      context: .
      dockerfile: apps/financial-service/Dockerfile.prod
    container_name: bazarx_financial
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - FINANCIAL_DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/barterborsa_financial?schema=public
      - GRPC_PORT=50051
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
    expose:
      - "50051"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 50051 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bazarx_net

  # ─── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bazarx_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_MULTIPLE_DATABASES=barterborsa_financial
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bazarx_net

  # ─── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bazarx_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bazarx_net

  # ─── RabbitMQ ────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: bazarx_rabbitmq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    expose:
      - "5672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - bazarx_net

  # ─── MinIO (Object Storage) ──────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: bazarx_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - bazarx_net

  # ─── Cloudflare Tunnel (Remote Access) ──────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: bazarx_tunnel
    restart: unless-stopped
    command: tunnel --config /home/nonroot/.cloudflared/config.yml run bazarx-tunnel
    volumes:
      - /home/hayzaran/.cloudflared:/home/nonroot/.cloudflared
    depends_on:
      - nginx
    networks:
      - bazarx_net

  # ─── Loki (Log Aggregation) ─────────────────────────────────────
  loki:
    image: grafana/loki:3.3.0
    container_name: bazarx_loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
      - ./infra/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - bazarx_net

  # ─── Promtail (Log Shipper) ─────────────────────────────────────
  promtail:
    image: grafana/promtail:3.3.0
    container_name: bazarx_promtail
    restart: unless-stopped
    volumes:
      - ./infra/promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - nginx_logs:/var/log/nginx:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/promtail-config.yaml
    depends_on:
      - loki
    networks:
      - bazarx_net

  # ─── Prometheus (Metrics) ────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: bazarx_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - bazarx_net

  # ─── Grafana (Visualization) ────────────────────────────────────
  grafana:
    image: grafana/grafana:11.5.2
    container_name: bazarx_grafana
    restart: unless-stopped
    ports:
      - "3030:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - bazarx_net

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  nginx_logs:
  bazarx_uploads:
  loki_data:
  prometheus_data:
  grafana_data:

networks:
  bazarx_net:
    driver: bridge
