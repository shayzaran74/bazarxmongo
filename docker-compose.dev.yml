# docker-compose.dev.yml — Geliştirme ortamı servis tanımları
# Kullanım: docker compose -f docker-compose.dev.yml up -d
version: '3.9'

services:

  # ─── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bazarx-postgresql
    restart: unless-stopped
    environment:
      POSTGRES_USER: barterborsa
      POSTGRES_PASSWORD: barterborsa123
      POSTGRES_DB: barterborsa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barterborsa -d barterborsa"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MongoDB ─────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: bazarx-mongodb-new
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: barterborsa
      MONGO_INITDB_ROOT_PASSWORD: barterborsa123
      MONGO_INITDB_DATABASE: bazarxmongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Mongo Express (MongoDB Web UI) ──────────────────────────────
  mongo-express:
    image: mongo-express
    container_name: bazarx-mongo-express-new
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_URL: "mongodb://barterborsa:barterborsa123@mongodb:27017/?authSource=admin&directConnection=true"
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: barterborsa123
    ports:
      - "8082:8081"
    depends_on:
      mongodb:
        condition: service_healthy

  # ─── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bazarx-redis-new
    restart: unless-stopped
    command: redis-server --requirepass barterborsa123 --maxmemory 256mb --maxmemory-policy noeviction
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "barterborsa123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── RabbitMQ ────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: bazarx-rabbitmq-new
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: barterborsa
      RABBITMQ_DEFAULT_PASS: barterborsa123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── MinIO (Object Storage) ──────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: bazarx-minio-new
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: barterborsa
      MINIO_ROOT_PASSWORD: barterborsa123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  rabbitmq_data:
  minio_data:
