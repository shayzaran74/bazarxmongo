<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Arka plan -->
  <rect x="0" y="0" width="400" height="400" fill="#f8fafc"/>
  <!-- Izgara deseni -->
  <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
  </pattern>
  <rect x="0" y="0" width="400" height="400" fill="url(#grid)"/>
  <!-- Ürün ikonografisi -->
  <g transform="translate(200, 185)" opacity="0.25">
    <!-- Kutu -->
    <rect x="-50" y="-45" width="100" height="90" rx="8" fill="none" stroke="#94a3b8" stroke-width="3"/>
    <line x1="-50" y1="-15" x2="50" y2="-15" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,3"/>
    <!-- Üst kapak -->
    <path d="M-50 -45 L-20 -65 L80 -65 L50 -45 Z" fill="none" stroke="#94a3b8" stroke-width="3"/>
    <path d="M50 -45 L80 -65" fill="none" stroke="#94a3b8" stroke-width="3"/>
    <!-- Bant -->
    <line x1="0" y1="-65" x2="0" y2="45" stroke="#94a3b8" stroke-width="2" stroke-dasharray="3,3"/>
  </g>
  <!-- Alt metin -->
  <text x="200" y="270" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#94a3b8" letter-spacing="3">ÜRÜN GÖRSELİ</text>
  <text x="200" y="290" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#cbd5e1" letter-spacing="1">Henüz yüklenmedi</text>
</svg>
