<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="60%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="og-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4f46e5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Arka plan -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#og-bg)"/>
  <!-- Işıma efekti -->
  <ellipse cx="600" cy="315" rx="500" ry="300" fill="#4f46e5" opacity="0.08"/>
  <!-- Yatay çizgi -->
  <rect x="0" y="308" width="1200" height="2" fill="url(#og-accent)"/>

  <!-- Sol: Logo ikonu büyük -->
  <rect x="100" y="205" width="160" height="160" rx="36" fill="#4f46e5"/>
  <rect x="100" y="205" width="160" height="160" rx="36" fill="#818cf8" opacity="0.3"/>
  <!-- Çanta -->
  <rect x="136" y="272" width="88" height="68" rx="10" fill="white" opacity="0.95"/>
  <path d="M156 272 Q156 242 180 242 Q204 242 204 272" fill="none" stroke="white" stroke-width="9" stroke-linecap="round"/>
  <line x1="158" y1="296" x2="202" y2="296" stroke="#4f46e5" stroke-width="6" stroke-linecap="round"/>
  <!-- Aksан -->
  <circle cx="244" cy="221" r="16" fill="#f59e0b"/>

  <!-- Sağ: İsim ve slogan -->
  <text x="310" y="285" font-family="Georgia, serif" font-size="72" font-weight="700" fill="white" letter-spacing="-2">Bazar<tspan fill="#818cf8">X</tspan></text>
  <text x="312" y="335" font-family="Arial, sans-serif" font-size="20" fill="#a5b4fc" letter-spacing="5">TÜRKİYE'NİN HİBRİT TİCARET PLATFORMU</text>

  <!-- Alt bilgi -->
  <line x1="100" y1="415" x2="1100" y2="415" stroke="#4f46e5" stroke-width="1" stroke-dasharray="4,6" opacity="0.4"/>
  <text x="100" y="450" font-family="Arial, sans-serif" font-size="18" fill="#6366f1" letter-spacing="2">E-TİCARET</text>
  <text x="310" y="450" font-family="Arial, sans-serif" font-size="18" fill="#4b5563">•</text>
  <text x="340" y="450" font-family="Arial, sans-serif" font-size="18" fill="#6366f1" letter-spacing="2">BARTER</text>
  <text x="480" y="450" font-family="Arial, sans-serif" font-size="18" fill="#4b5563">•</text>
  <text x="510" y="450" font-family="Arial, sans-serif" font-size="18" fill="#6366f1" letter-spacing="2">AÇIK ARTIRMA</text>
  <text x="730" y="450" font-family="Arial, sans-serif" font-size="18" fill="#4b5563">•</text>
  <text x="760" y="450" font-family="Arial, sans-serif" font-size="18" fill="#6366f1" letter-spacing="2">ÇEKİLİŞ</text>

  <!-- bazarx.com.tr -->
  <text x="1100" y="580" text-anchor="end" font-family="Georgia, serif" font-size="18" fill="#4f46e5" letter-spacing="1" opacity="0.7">bazarx.com.tr</text>
